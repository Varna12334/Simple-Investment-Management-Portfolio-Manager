<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Portfolio Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h2>📈 InvestManager</h2>
            <p style="color: var(--text-secondary); margin-top: 5px;">Create an account to start tracking investments</p>
        </div>

        <form action="login.html" method="GET">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Minimum 8 characters" minlength="8" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn">Create Account</button>
        </form>

        <div style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
            <span style="color: var(--text-secondary);">Already have an account?</span> 
            <a href="login.html" style="font-weight: 600;">Sign In here</a>
        </div>
    </div>

</body>
</html>
