<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vesture Management - Control Terminal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f1f5f9; color: #1e293b; display: flex; flex-direction: column; height: 100vh; }
        header { background: #0f172a; color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 24px; font-weight: 700; color: #38bdf8; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .logout-btn:hover { background: #dc2626; }
        
        .main-container { display: grid; grid-template-columns: 320px 1fr 380px; gap: 24px; padding: 24px; flex: 1; overflow: hidden; }
        .pane { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); padding: 24px; display: flex; flex-direction: column; overflow-y: auto; }
        h2 { margin-top: 0; color: #0f172a; font-size: 18px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Stats Ribbon */
        .totals-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: #1e293b; color: white; padding: 16px; border-radius: 8px; text-align: center; }
        .stat-card.profit { background: #10b981; }
        .stat-card.loss { background: #ef4444; }
        .stat-card p { margin: 0; font-size: 12px; opacity: 0.8; font-weight: 600; text-transform: uppercase; }
        .stat-card h3 { margin: 8px 0 0 0; font-size: 22px; }

        /* Form styling */
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #64748b; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #38bdf8; }
        .submit-btn { width: 100%; background: #10b981; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; margin-top: 10px; }
        .submit-btn:hover { background: #059669; }

        /* Table design */
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background: #f8fafc; font-weight: 600; color: #64748b; }

        /* Forecast Cards */
        .forecast-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 14px; border-radius: 8px; margin-bottom: 12px; }
        .forecast-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }
        .signal-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-top: 4px; display: inline-block; }
        .signal-badge.buy { background: #d1fae5; color: #065f46; }
        .signal-badge.hold { background: #fef3c7; color: #92400e; }
        .signal-badge.sell { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <header>
        <h1>Vesture Systems Asset Control</h1>
        <button class="logout-btn" onclick="handleLogout()">Exit Terminal</button>
    </header>

    <div class="main-container">
        <div class="pane">
            <h2>Post Trade Execution</h2>
            <form id="asset-form">
                <div class="form-group">
                    <label>Asset Symbol / Name</label>
                    <input type="text" id="name" required placeholder="e.g. AAPL, BTC, SPY">
                </div>
                <div class="form-group">
                    <label>Asset Classification</label>
                    <select id="type">
                        <option value="Stock">Stock Equity</option>
                        <option value="Crypto">Digital Currency</option>
                        <option value="Mutual Fund">Mutual Fund</option>
                        <option value="Cash">Cash Asset</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Units / Quantity</label>
                    <input type="number" step="any" id="quantity" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Cost Basis per Unit ($)</label>
                    <input type="number" step="any" id="buy_price" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Spot Valuation Price ($)</label>
                    <input type="number" step="any" id="current_price" required placeholder="0.00">
                </div>
                <button type="submit" class="submit-btn">Commit to Portfolio</button>
            </form>
        </div>

        <div class="pane" style="padding-top: 20px;">
            <div class="totals-bar">
                <div class="stat-card">
                    <p>Total Capital Allocated</p>
                    <h3 id="total-invested">$0.00</h3>
                </div>
                <div class="stat-card">
                    <p>Aggregated Net Assets</p>
                    <h3 id="total-current">$0.00</h3>
                </div>
                <div id="pnl-stat" class="stat-card">
                    <p>System Profit / Loss</p>
                    <h3 id="total-pnl">$0.00 (0%)</h3>
                </div>
            </div>

            <h2>Open Portfolio Positions</h2>
            <div style="flex: 1; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Position</th>
                            <th>Class</th>
                            <th>Qty</th>
                            <th>Cost Basis</th>
                            <th>Spot Price</th>
                            <th>Unrealized Return</th>
                        </tr>
                    </thead>
                    <tbody id="portfolio-table-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="pane">
            <h2>Machine Learning Projections</h2>
            <div id="ml-analytics-pane" style="flex: 1;">
                <p style="color:#64748b; font-style:italic; font-size:13px;">Computing models...</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        // Inject predictive loading directly into dashboard runtime pipeline
        async function loadPredictiveAnalytics() {
            try {
                const response = await fetch('http://127.0.0.1:5000/api/analytics/signals');
                if (!response.ok) return;
                const data = await response.json();
                
                const pane = document.getElementById('ml-analytics-pane');
                pane.innerHTML = '';
                
                if(!data.signals || data.signals.length === 0) {
                    pane.innerHTML = '<p style="color:#64748b; font-style:italic; font-size:13px;">No predictive telemetry open. Add assets to populate tracking metrics.</p>';
                    return;
                }
                
                data.signals.forEach(sig => {
                    const isBuy = sig['Algorithmic Signal'].includes('BUY');
                    const isSell = sig['Algorithmic Signal'].includes('SELL');
                    let badgeClass = 'hold';
                    if (isBuy) badgeClass = 'buy';
                    if (isSell) badgeClass = 'sell';

                    pane.innerHTML += `
                        <div class="forecast-item">
                            <div class="forecast-header">
                                <span>${sig['Asset Name']}</span>
                                <span style="color:#0284c7;">MACD: ${sig['Momentum Metric']}</span>
                            </div>
                            <div style="margin-top:8px; font-size:13px; color:#334155;">
                                Target Vector: <span class="signal-badge ${badgeClass}">${sig['Algorithmic Signal']}</span>
                            </div>
                            <div style="font-size:11px; color:#64748b; margin-top:4px;">Confidence Index: ${sig['Confidence']}</div>
                        </div>
                    `;
                });
            } catch(e) { console.error(e); }
        }
        
        // Execute analytics pulling loop alongside spreadsheet cycles
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(loadPredictiveAnalytics, 800);
            setInterval(loadPredictiveAnalytics, 10000);
        });
    </script>
</body>
</html>
